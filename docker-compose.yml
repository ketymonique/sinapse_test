version: '3.8'

services:
  app:
    build: .
    container_name: sinapse_test_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: sinapse_test_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:15
    container_name: sinapse_test_db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  db_test:
    image: postgres:15
    container_name: sinapse_test_db_test
    environment:
      POSTGRES_DB: ${DB_TEST_DATABASE}
      POSTGRES_USER: ${DB_TEST_USERNAME}
      POSTGRES_PASSWORD: ${DB_TEST_PASSWORD}
    ports:
      - "5433:5432"   
    volumes:
      - db_test_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: sinapse_test_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
  db_test_data: