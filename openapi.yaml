openapi: 3.0.0
info:
  title: User Management API
  version: 1.0.0
servers:
  - url: http://localhost:8080/api
paths:
  /users:
    get:
      summary: Lista usuários com paginação e filtros
      parameters:
        - name: page
          in: query
          schema: { type: integer }
        - name: id
          in: query
          schema: { type: integer }
        - name: filter[name]
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/User' } }
                  links: { type: object }
                  meta: { type: object }
    post:
      summary: Cria um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
      responses:
        '201':
          description: Criado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '422':
          description: Erro de validação
  /users/{id}:
    get:
      summary: Busca um usuário por ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Sucesso
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404':
          description: Usuário não encontrado
    put:
      summary: Atualiza o usuário
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
      responses:
        '200':
          description: Atualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404': { description: Usuário não encontrado }
        '422': { description: Erro de validação }
    delete:
      summary: Remove um usuário (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Sem conteúdo (deletado) }
        '404': { description: Usuário não encontrado }

components:
  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        created_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }
      example:
        id: 1
        name: "João Silva"
        email: "joao@exemplo.com"
        phone: "(11) 99999-9999"
        created_at: "2025-04-04T14:30:00+00:00"
        deleted_at: null
    UserInput:
      type: object
      required: [name, email, password, phone]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8, description: "Pelo menos 8 caracteres, 1 maiúscula, 1 minúscula, 1 número, 1 caractere especial" }
        password_confirmation: { type: string }
        phone: { type: string, pattern: '^\(\d{2}\) \d{5}-\d{4}$' }